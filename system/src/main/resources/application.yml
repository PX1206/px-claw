server:
  port: 9168
  tomcat:
    max-threads: 500        # 最大线程数
    min-spare-threads: 50   # 最小空闲线程数
    accept-count: 200       # 等待队列大小

logging:
  config: classpath:logback-spring.xml
  level:
    com.claw.system.mapper: debug # 使用logging方式打印SQL日志，方便查看logid

spring:
  application:
    # 服务名称
    name: claw-system
  servlet:
    multipart:
      max-file-size: 1024MB # 设置最大上传文件大小限制
      max-request-size: 1024MB # 需 >= max-file-size，否则大安装包上传失败
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/claw_db?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: px123456
    # 使用druid数据源
    druid:
      #2.连接池配置
      #初始化连接池的连接数量 大小，最小，最大
      initial-size: 5
      min-idle: 5
      max-active: 20
      #配置获取连接等待超时的时间
      max-wait: 60000
      #配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 是否缓存preparedStatement，也就是PSCache  官方建议MySQL下建议关闭   个人建议如果想用SQL防火墙 建议打开
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: 20
      # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
      filter:
        stat:
          merge-sql: true
          slow-sql-millis: 5000
  redis:
    host: 127.0.0.1
    port: 6379
    password: px123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: claw-group
    send-message-timeout: 6000
  instance-name: claw-instance

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 虽然默认为 true ，但是还是显示去指定下。
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: AUTO
      # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-field: delFlag
      # 逻辑已删除值(默认为 1)
      logic-delete-value: 1
      # 逻辑未删除值(默认为 0)
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.claw.system.entity


