# AI 客服：FAISS 检索 + 推理（二选一）
# （1）与「对话」页 OpenAI 兼容源一致：填 completion-base-url（通常以 /v1 结尾）、completion-model；
# （2）本机 subprocess：填 llama-exe、model-path（.gguf）
ai:
  chat:
    completion-base-url: ""
    completion-api-key: ""
    completion-model: ""
    completion-temperature: 0.7
    completion-connect-timeout-ms: 15000
    completion-read-timeout-ms: 180000
    llama-exe: ""
    model-path: ""
    max-tokens: 256
    faq-file: classpath:data/faq.txt
    rag-limit: 3
    process-timeout-seconds: 300
    retrieval-enabled: true
    retrieval-base-url: http://127.0.0.1:9170
    retrieval-connect-timeout-ms: 5000
    retrieval-read-timeout-ms: 120000
    # 与 Python 默认一致时，导入话术后 FAISS reload 可读到同文件（见 retrieval-service main.py）
    user-faq-path: ${user.home}/.px-claw/faq.txt

# 邮件渠道：IMAP 拉取 → AI 建议回复 → 人工审核后 SMTP 发出（详见 system/README.md）
mail:
  inbound:
    enabled: false
    host: ${MAIL_IMAP_HOST:imap.example.com}
    port: ${MAIL_IMAP_PORT:993}
    username: ${MAIL_IMAP_USER:}
    password: ${MAIL_IMAP_PASSWORD:}
    folder: INBOX
    ssl: true
    poll-interval-ms: 60000
    max-batch-per-poll: 20
  smtp:
    enabled: false
    host: ${MAIL_SMTP_HOST:smtp.example.com}
    port: ${MAIL_SMTP_PORT:587}
    username: ${MAIL_SMTP_USER:}
    password: ${MAIL_SMTP_PASSWORD:}
    ssl: false
    starttls: true
    from-address: ${MAIL_FROM:noreply@example.com}

